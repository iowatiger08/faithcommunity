AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hope & Truth Ministry — Lambda functions, API Gateway, SES, and Route 53 DNS

Parameters:
  HopeAndTruthHostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Default: Z1W12OVIJHI59G
    Description: Route 53 hosted zone for hopeandtruthministry.com
  SenderDomain:
    Type: String
    Default: hopeandtruthministry.com
    Description: Domain used for SES sending identity and DKIM records

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    Architectures:
      - x86_64

Resources:

  # ── SES email identity + DKIM ─────────────────────────────────────────────
  # Manages the sending identity for noreply@hopeandtruthministry.com.
  # CloudFormation provisions DKIM keys and outputs the three CNAME tokens;
  # the records below wire them into Route 53 automatically.
  # To tear down: sam delete (removes identity + DKIM records together).
  SesEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref SenderDomain
      DkimAttributes:
        SigningEnabled: true

  SesDkimRecord1:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HopeAndTruthHostedZoneId
      Name: !Sub "${SesEmailIdentity.DkimDNSTokenName1}._domainkey.${SenderDomain}"
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !Sub "${SesEmailIdentity.DkimDNSTokenValue1}"

  SesDkimRecord2:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HopeAndTruthHostedZoneId
      Name: !Sub "${SesEmailIdentity.DkimDNSTokenName2}._domainkey.${SenderDomain}"
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !Sub "${SesEmailIdentity.DkimDNSTokenValue2}"

  SesDkimRecord3:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HopeAndTruthHostedZoneId
      Name: !Sub "${SesEmailIdentity.DkimDNSTokenName3}._domainkey.${SenderDomain}"
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !Sub "${SesEmailIdentity.DkimDNSTokenValue3}"

  # ── Blogger proxy ─────────────────────────────────────────────────────────
  BloggerProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: blogger-proxy/
      Handler: index.handler
      Runtime: nodejs18.x
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          NODE_OPTIONS: '--enable-source-maps'
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: 'arn:aws:secretsmanager:us-west-2:166782860262:secret:prod/blogger-3y8Pt2'
      Events:
        BloggerApi:
          Type: Api
          Properties:
            Path: /blogger/posts
            Method: get
            RestApiId: !Ref BloggerApiGateway
        BloggerApiOptions:
          Type: Api
          Properties:
            Path: /blogger/posts
            Method: options
            RestApiId: !Ref BloggerApiGateway

  BloggerApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'hopeandtruthministry.com'"
      DefinitionBody:
        openapi: 3.0.0
        info:
          title: Blogger Proxy API
          version: 1.0.0
        paths:
          /blogger/posts:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BloggerProxyFunction.Arn}/invocations
              responses:
                '200':
                  description: Success
            options:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BloggerProxyFunction.Arn}/invocations
              responses:
                '200':
                  description: Success

  # ── Contact form ──────────────────────────────────────────────────────────
  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: contact-form/
      Handler: index.handler
      Runtime: nodejs18.x
      MemorySize: 128
      Timeout: 15
      Environment:
        Variables:
          RECIPIENT_EMAIL: hopeandtruthministry@gmail.com
          SENDER_EMAIL: !Sub "noreply@${SenderDomain}"
          TOXICITY_THRESHOLD: "0.75"
          RATE_LIMIT_PER_HOUR: "2"
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - ses:SendEmail
            Resource: "*"
          - Effect: Allow
            Action:
              - comprehend:DetectToxicContent
            Resource: "*"
      Events:
        ContactPost:
          Type: HttpApi
          Properties:
            Path: /contact
            Method: post
            ApiId: !Ref ContactHttpApi
        ContactOptions:
          Type: HttpApi
          Properties:
            Path: /contact
            Method: options
            ApiId: !Ref ContactHttpApi

  ContactHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "https://hopeandtruthministry.com"
          - "https://www.hopeandtruthministry.com"
          - "http://localhost:5173"
          - "http://localhost:4173"
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - POST
          - OPTIONS
        MaxAge: 300

Outputs:
  BloggerApiUrl:
    Description: "API Gateway endpoint URL for Blogger proxy"
    Value: !Sub "https://${BloggerApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/blogger/posts"
  BloggerProxyFunctionArn:
    Description: "Blogger Proxy Lambda Function ARN"
    Value: !GetAtt BloggerProxyFunction.Arn
  ContactApiUrl:
    Description: "Contact form API endpoint — set as VITE_CONTACT_API_URL in your build env"
    Value: !Sub "https://${ContactHttpApi}.execute-api.${AWS::Region}.amazonaws.com/contact"
  SesDomain:
    Description: "SES verified sending domain"
    Value: !Ref SenderDomain
